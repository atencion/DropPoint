<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DropPoint</title>
</head>

<body style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',
        'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans',
        'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    ">

  <!-- Main app wrapper -->
  <div id="dp-app-wrap" style="
        -webkit-app-region: drag;
        border-radius: 0.5rem;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 250, 240);
        backdrop-filter: blur(20px) saturate(125%);
        display: flex;
        flex-direction: column;
      ">

    <!-- ── TOOLBAR ─────────────────────────────────────────── -->
    <div id="dp-toolbar">
      <div id="dp-toolbar-head">
        <div id="dp-title-group">
          <span id="dp-zone-name" title="Double click to rename">Drop Zone</span>
        </div>
        <button id="dp-close-btn" title="Close this Drop Zone" class="dp-btn dp-btn-close" aria-label="Close this Drop Zone">&times;</button>
      </div>
      <div id="dp-rename-row">
        <input id="dp-zone-input" type="text" value="Drop Zone" />
        <button id="dp-rename-cancel" title="Cancel rename">&times;</button>
      </div>

      <!-- Action buttons -->
      <div id="dp-btn-group">
        <button id="dp-new-btn" title="Open a new Drop Zone" class="dp-btn dp-btn-new">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14"/><path d="M5 12h14"/>
          </svg>
          New
        </button>
        <button id="dp-save-btn" title="Save this zone to Gallery" class="dp-btn dp-btn-save">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
          Save
        </button>
        <button id="dp-gallery-btn" title="Open Gallery" class="dp-btn dp-btn-gallery">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Gallery
        </button>
        <button id="dp-clipboard-btn" title="Open Clipboard Flow" class="dp-btn dp-btn-clipboard">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 4H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/>
          </svg>
          Clipboard
        </button>
        <button id="dp-clear-btn" title="Clear this Drop Zone" class="dp-btn dp-btn-clear">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
          Clear
        </button>
      </div>
    </div>

    <!-- ── DROP ZONE ──────────────────────────────────────── -->
    <div id="droppoint">
      <div class="upload">
        <img src="./media/upload.png" alt="Upload Here" style="opacity: 0.8; pointer-events: none" />
        Drop Your File(s) Here
      </div>
      <div id="drag">
        <div class="file-icon">
          <img src="" />
          <img src="" />
          <img src="" />
        </div>
        Drag Your <num></num> File(s) Out
      </div>
      <div id="dp-memory-actions">
        <button id="dp-clip-up" class="dp-memory-tool-btn">Up</button>
        <button id="dp-clip-new-folder" class="dp-memory-tool-btn">New folder</button>
        <button id="dp-clip-view-toggle" class="dp-memory-tool-btn">Grid</button>
        <div id="dp-drag-selected" class="dp-memory-drag-pill" draggable="true">Drag selected</div>
        <div id="dp-drag-all" class="dp-memory-drag-pill" draggable="true">Drag all</div>
        <button id="dp-clear-missing" class="dp-memory-danger-btn">Clear missing</button>
      </div>
      <div id="dp-clip-breadcrumbs"></div>
      <div id="dp-memory-list"></div>
      <div id="dp-drop-hint">Drop files or paste text/images with Ctrl+V</div>
      <div id="dp-folder-color-picker" aria-hidden="true"></div>
    </div>

    <!-- ── SAVE TOAST ──────────────────────────────────────── -->
    <div id="dp-toast">Zone saved to Gallery ✓</div>

  </div><!-- /dp-app-wrap -->

  <!-- ── GALLERY OVERLAY ────────────────────────────────────── -->
  <div id="dp-gallery-overlay">
    <div id="dp-gallery-panel">

      <div id="dp-gallery-header">
        <div id="dp-gallery-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Gallery
        </div>
        <div id="dp-gallery-controls">
          <button id="dp-gallery-up" class="dp-card-btn dp-card-btn-load" title="Go to parent folder">Up</button>
          <button id="dp-gallery-new-folder" class="dp-card-btn dp-card-btn-load" title="Create a new folder">New Folder</button>
          <button id="dp-gallery-view-toggle" class="dp-card-btn dp-card-btn-load" title="Toggle list/grid view">Grid</button>
        </div>
        <button id="dp-gallery-close" title="Close Gallery">&#215;</button>
      </div>
      <div id="dp-gallery-breadcrumbs"></div>

      <div id="dp-gallery-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c0c0c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <p>No saved zones yet.<br/>Drop files and click <strong>Save</strong>.</p>
      </div>

      <div id="dp-gallery-list"></div>

    </div>
  </div><!-- /dp-gallery-overlay -->

  <div id="dp-clipboard-overlay">
    <div id="dp-clipboard-panel">
      <div id="dp-clipboard-header">
        <div id="dp-clipboard-title">Clipboard Flow</div>
        <button id="dp-clipboard-close" title="Close Clipboard">&#215;</button>
      </div>
      <div id="dp-clipboard-list"></div>
    </div>
  </div>

  <div id="dp-text-preview-overlay">
    <div id="dp-text-preview-panel">
      <div id="dp-text-preview-header">
        <div id="dp-text-preview-title">Text Preview</div>
        <button id="dp-text-preview-close" title="Close Preview">&times;</button>
      </div>
      <pre id="dp-text-preview-body"></pre>
    </div>
  </div>

  <div id="dp-image-preview-overlay">
    <div id="dp-image-preview-panel">
      <div id="dp-image-preview-header">
        <div id="dp-image-preview-title">Image Preview</div>
        <button id="dp-image-preview-close" title="Close Preview">&times;</button>
      </div>
      <div id="dp-image-preview-body-wrap">
        <img id="dp-image-preview-body" alt="Clipboard preview" />
      </div>
    </div>
  </div>

  <div id="dp-clip-image-hover" aria-hidden="true">
    <img id="dp-clip-image-hover-img" alt="Clipboard image quick preview" />
  </div>

</body>

<!-- ══════════════════ STYLES ══════════════════ -->
<style>
  * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
  }

  /* Tilt animation keyframes for multiple files */
  @keyframes tilt {
    from { transform: rotate(0deg); }
    to { transform: rotate(25deg); transform-origin: bottom; }
  }

  @keyframes tiltmore {
    from { transform: rotate(0deg); }
    to { transform: rotate(50deg); transform-origin: bottom; }
  }

  @keyframes dp-fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes dp-toastIn {
    0%   { opacity: 0; transform: translateY(10px); }
    20%  { opacity: 1; transform: translateY(0); }
    80%  { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(10px); }
  }

  html {
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  :root {
    --dp-ink: #132235;
    --dp-muted-ink: #5b6878;
    --dp-line: rgba(19, 34, 53, 0.14);
    --dp-surface: rgba(255, 252, 246, 0.92);
    --dp-accent: #0f766e;
    --dp-accent-strong: #115e59;
    --dp-danger: #b4232d;
  }

  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* ── TOOLBAR ─────────────────────────────────── */
  #dp-app-wrap {
    overflow: hidden;
  }

  #dp-toolbar {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 8px 10px 7px;
    -webkit-app-region: drag;
    flex-shrink: 0;
    gap: 7px;
    min-height: 48px;
    border-bottom: 1px solid var(--dp-line);
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.18));
  }

  #dp-toolbar-head {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #dp-zone-name {
    font-size: 0.74rem;
    font-weight: 750;
    color: var(--dp-ink);
    cursor: default;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
    flex: 1;
    -webkit-app-region: no-drag;
    letter-spacing: 0.005em;
    transition: color 0.2s;
  }

  #dp-zone-name:hover {
    color: #0a1626;
  }

  #dp-zone-input {
    font-size: 0.62rem;
    font-weight: 600;
    color: #050a0f;
    border: 1px solid rgba(5,10,15,0.25);
    border-radius: 4px;
    padding: 1px 5px;
    background: rgba(255,255,255,0.7);
    outline: none;
    flex: 1;
    max-width: 180px;
    display: none;
    -webkit-app-region: no-drag;
  }

  #dp-rename-row {
    display: none;
    align-items: center;
    gap: 6px;
    -webkit-app-region: no-drag;
  }

  #dp-rename-cancel {
    width: 20px;
    height: 20px;
    border: none;
    border-radius: 999px;
    background: rgba(5,10,15,0.08);
    color: #4f5c6c;
    cursor: pointer;
    line-height: 1;
  }

  #dp-rename-cancel:hover {
    background: rgba(224,82,82,0.18);
    color: #bf3030;
  }

  #dp-title-group {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    -webkit-app-region: drag;
  }

  #dp-zone-input:focus {
    border-color: rgba(5,10,15,0.5);
    box-shadow: 0 0 0 2px rgba(5,10,15,0.08);
  }

  #dp-btn-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-start;
    -webkit-app-region: no-drag;
    align-items: center;
  }

  .dp-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    padding: 5px 9px;
    border-radius: 7px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
    line-height: 1;
    text-transform: none;
    -webkit-app-region: no-drag;
    min-height: 28px;
  }

  .dp-btn svg {
    flex-shrink: 0;
  }

  .dp-btn-save {
    background: rgba(19, 34, 53, 0.06);
    color: var(--dp-muted-ink);
    border-color: var(--dp-line);
  }

  .dp-btn-save:hover {
    background: rgba(19, 34, 53, 0.12);
    color: var(--dp-ink);
  }

  .dp-btn-save.dp-has-files {
    background: rgba(22, 163, 74, 0.14);
    color: #166534;
    border-color: rgba(22, 163, 74, 0.28);
  }

  .dp-btn-save.dp-has-files:hover {
    background: rgba(22, 163, 74, 0.22);
  }

  .dp-btn-gallery {
    background: rgba(19, 34, 53, 0.06);
    color: var(--dp-muted-ink);
    border-color: var(--dp-line);
  }

  .dp-btn-gallery:hover {
    background: rgba(19, 34, 53, 0.12);
    color: var(--dp-ink);
  }

  .dp-btn-gallery.dp-has-saved {
    background: rgba(15, 118, 110, 0.14);
    color: var(--dp-accent-strong);
    border-color: rgba(15, 118, 110, 0.28);
  }

  .dp-btn-gallery.dp-has-saved:hover {
    background: rgba(15, 118, 110, 0.24);
  }

  .dp-btn-clipboard {
    background: rgba(19, 34, 53, 0.06);
    color: var(--dp-muted-ink);
    border-color: var(--dp-line);
  }

  .dp-btn-clipboard:hover {
    background: rgba(19, 34, 53, 0.12);
    color: var(--dp-ink);
  }

  .dp-btn-new {
    background: rgba(15, 118, 110, 0.16);
    color: var(--dp-accent-strong);
    border-color: rgba(15, 118, 110, 0.28);
  }

  .dp-btn-new:hover {
    background: rgba(15, 118, 110, 0.24);
    color: #134e4a;
  }

  .dp-btn-clear {
    background: rgba(180, 35, 45, 0.08);
    color: var(--dp-danger);
    border-color: rgba(180, 35, 45, 0.24);
    margin-left: auto;
  }

  .dp-btn-clear:hover {
    background: rgba(180, 35, 45, 0.16);
    color: #8f1921;
  }

  .dp-btn-close {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    padding: 0;
    font-size: 0.85rem;
    line-height: 1;
    background: rgba(19, 34, 53, 0.08);
    color: var(--dp-muted-ink);
    border: 1px solid rgba(19, 34, 53, 0.08);
    justify-content: center;
    -webkit-app-region: no-drag;
  }

  .dp-btn-close:hover {
    background: rgba(180, 35, 45, 0.14);
    color: #8f1921;
  }

  /* ── DROP ZONE ────────────────────────────────── */
  @keyframes dragged {
    from { border-radius: 100px; border: 2px dashed #050a0f00; }
    to   { border-radius: 6px;   border: 2px dashed #050a0f85; }
  }

  .dragged {
    cursor: grabbing;
    animation: dragged 0.5s forwards;
  }

  #droppoint {
    position: relative;
    flex: 1;
    min-height: 0;
    margin: 4px 8px 8px 8px;
    color: #050a0fa2;
    user-select: none;
    border: 2px transparent solid;
    -webkit-app-region: drag;
    transition: all 0.5s ease-in-out;
    display: flex;
    flex-direction: column;
    padding: 6px;
    gap: 6px;
  }

  .upload {
    width: 100%;
    height: 100%;
    display: flex;
    text-align: center;
    flex-direction: column;
    font-size: 0.75rem;
    font-family: sans-serif;
    user-select: none;
    align-items: center;
    justify-content: center;
  }

  .upload img,
  .file-icon img {
    max-width: 60px;
    padding: 8px;
  }

  #drag {
    height: 100%;
    width: 100%;
    display: none;
    text-align: center;
    flex-direction: column;
    font-size: 0.75rem;
    font-family: sans-serif;
    align-items: center;
    justify-content: center;
  }

  #dp-memory-list {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    gap: 6px;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 2px;
    -webkit-app-region: no-drag;
  }

  #dp-memory-list.dp-clip-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    align-content: start;
  }

  #dp-memory-list.dp-clip-grid .dp-memory-item {
    display: flex;
    flex-direction: column;
    gap: 7px;
    align-items: stretch;
    min-height: 178px;
    padding: 9px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.94);
    box-shadow: 0 3px 10px rgba(5, 10, 15, 0.06);
  }

  #dp-memory-list.dp-clip-grid .dp-memory-thumb {
    width: 100%;
    height: 92px;
    border-radius: 8px;
  }

  #dp-memory-list.dp-clip-grid .dp-memory-meta {
    gap: 3px;
    width: 100%;
  }

  #dp-memory-list.dp-clip-grid .dp-memory-name {
    font-size: 0.66rem;
  }

  #dp-memory-list.dp-clip-grid .dp-memory-preview {
    font-size: 0.58rem;
  }

  #dp-memory-list.dp-clip-grid .dp-memory-actions {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
    justify-content: stretch;
    min-width: 0;
    margin-top: auto;
  }

  #dp-memory-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    -webkit-app-region: no-drag;
    flex-wrap: wrap;
    padding: 2px 0 1px;
  }

  #dp-clip-breadcrumbs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    -webkit-app-region: no-drag;
  }

  .dp-clip-crumb {
    --dp-folder-rgb: 71, 85, 105;
    --dp-folder-solid: #334155;
    border: 1px solid rgba(var(--dp-folder-rgb), 0.28);
    border-radius: 999px;
    background: rgba(var(--dp-folder-rgb), 0.12);
    color: var(--dp-folder-solid);
    font-size: 0.56rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    cursor: pointer;
  }

  .dp-clip-crumb.dp-clip-crumb-active {
    background: rgba(var(--dp-folder-rgb), 0.2);
    border-color: rgba(var(--dp-folder-rgb), 0.48);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
  }

  .dp-clip-crumb.dp-drop-target-active {
    background: rgba(var(--dp-folder-rgb), 0.3);
    border-color: rgba(var(--dp-folder-rgb), 0.64);
    color: var(--dp-folder-solid);
  }

  .dp-memory-folder {
    --dp-folder-rgb: 14, 116, 144;
    --dp-folder-solid: #0f4c5d;
    border: 2px solid rgba(var(--dp-folder-rgb), 0.46);
    background: linear-gradient(
      180deg,
      rgba(var(--dp-folder-rgb), 0.2) 0%,
      rgba(var(--dp-folder-rgb), 0.08) 100%
    );
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.56);
  }

  .dp-memory-folder.dp-drop-target-active {
    border-color: rgba(var(--dp-folder-rgb), 0.72);
    background: rgba(var(--dp-folder-rgb), 0.26);
    box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.45);
  }

  .dp-memory-folder .dp-memory-thumb {
    background: rgba(var(--dp-folder-rgb), 0.26);
    border: 1px solid rgba(var(--dp-folder-rgb), 0.42);
    color: var(--dp-folder-solid);
  }

  .dp-memory-folder .dp-memory-name {
    color: var(--dp-folder-solid);
  }

  .dp-memory-folder .dp-memory-preview {
    color: rgba(var(--dp-folder-rgb), 0.95);
  }

  .dp-memory-thumb-folder {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 2px;
    padding: 4px;
  }

  .dp-folder-glyph {
    width: 15px;
    height: 15px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 2px;
  }

  .dp-folder-glyph > span {
    border-radius: 2px;
    background: currentColor;
    opacity: 0.82;
  }

  .dp-folder-dir-label {
    font-size: 0.46rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
  }

  #dp-memory-list.dp-clip-grid .dp-memory-folder {
    border-width: 2px;
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.6),
      0 0 0 1px rgba(var(--dp-folder-rgb), 0.22);
  }

  #dp-memory-list.dp-clip-grid .dp-memory-thumb-folder {
    gap: 6px;
  }

  #dp-memory-list.dp-clip-grid .dp-folder-glyph {
    width: 28px;
    height: 28px;
    gap: 4px;
  }

  #dp-memory-list.dp-clip-grid .dp-folder-dir-label {
    font-size: 0.84rem;
  }

  .dp-memory-folder .dp-mini-btn.dp-folder-color-btn {
    border-color: rgba(var(--dp-folder-rgb), 0.42);
    background: rgba(var(--dp-folder-rgb), 0.18);
    color: var(--dp-folder-solid);
  }

  .dp-memory-folder .dp-mini-btn.dp-folder-color-btn:hover {
    background: rgba(var(--dp-folder-rgb), 0.28);
  }

  #dp-folder-color-picker {
    position: fixed;
    z-index: 30;
    width: 238px;
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 9px;
    border-radius: 10px;
    border: 1px solid rgba(5, 10, 15, 0.14);

  function fileNameFromPath(filePath) {

  function toFileUrl(filePath) {

    if (!normalized) return "";
    const base = normalized.startsWith("/") ? `file://${normalized}` : `file:///${normalized}`;
    return encodeURI(base);

  function getFolderColorTone(colorKey) {

  function normalizeClipFolder(folder) {
    if (!folder || !folder.id) return null;
    const fallbackKey = folder.id === CLIP_ROOT_ID ? ROOT_FOLDER_COLOR_KEY : DEFAULT_FOLDER_COLOR_KEY;
    const tone = getFolderColorTone(folder.colorKey || fallbackKey);
    return {
      ...folder,

  function ensureClipFoldersModel(rawFolders) {
    const source = Array.isArray(rawFolders) && rawFolders.length
      ? rawFolders
      : [{ id: CLIP_ROOT_ID, name: "Root", parentId: null, colorKey: ROOT_FOLDER_COLOR_KEY }];
    const normalized = source
      .map((folder) => normalizeClipFolder(folder))
      .filter(Boolean);

    if (!normalized.some((folder) => folder.id === CLIP_ROOT_ID)) {
      normalized.unshift({ id: CLIP_ROOT_ID, name: "Root", parentId: null, colorKey: ROOT_FOLDER_COLOR_KEY });

  function hideFolderColorPicker() {

  function openFolderColorPicker(anchor, folder) {

  function clipFolderPath(folderId) {
    const path = [];
    let cursor = folderId;
    while (cursor && cursor !== CLIP_ROOT_ID) {
      const folder = getClipFolderById(cursor);
      if (!folder) break;
      path.unshift(folder);
      cursor = folder.parentId;
    }
    const root = normalizeClipFolder(
      getClipFolderById(CLIP_ROOT_ID) || { id: CLIP_ROOT_ID, name: "Root", parentId: null, colorKey: ROOT_FOLDER_COLOR_KEY }
    );

  }

  function nextFolderName(existingNames, base = "New Folder") {
    const taken = new Set((existingNames || []).map((name) => String(name || "").toLowerCase()));
    if (!taken.has(base.toLowerCase())) return base;
    let n = 2;
    while (taken.has(`${base} ${n}`.toLowerCase())) {
      n += 1;
    }
    return `${base} ${n}`;
  }

  function hasTransferType(event, type) {
    const types = event && event.dataTransfer && event.dataTransfer.types
      ? Array.from(event.dataTransfer.types)
      : [];
    return types.includes(type);
  }

  function bindDropTarget(node, transferType, onDrop) {
    let dragDepth = 0;

    const clear = () => {
      dragDepth = 0;
      node.classList.remove("dp-drop-target-active");
    };

    node.addEventListener("dragenter", (event) => {
      if (!hasTransferType(event, transferType)) return;
      event.preventDefault();
      dragDepth += 1;
      node.classList.add("dp-drop-target-active");
    });

    node.addEventListener("dragover", (event) => {
      if (!hasTransferType(event, transferType)) return;
      event.preventDefault();
      node.classList.add("dp-drop-target-active");
    });

    node.addEventListener("dragleave", () => {
      if (!node.classList.contains("dp-drop-target-active")) return;
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) {
        node.classList.remove("dp-drop-target-active");
      }
    });

    node.addEventListener("drop", async (event) => {
      if (!hasTransferType(event, transferType)) return;
      event.preventDefault();
      clear();
      await onDrop(event);
    });
  }

  function confirmDanger(message) {

  function isNameTakenInSiblings(name, entries, excludedId) {

  function isTypingTarget(target) {

  }

  function startInlineRename(labelNode, options) {
    if (!labelNode || labelNode.dataset.inlineEditing === "1") return;

    const config = options || {};
    const parent = labelNode.parentElement;
    if (!parent) return;

    const initialName = String(config.initialName ?? labelNode.textContent ?? "").trim();
    labelNode.dataset.inlineEditing = "1";
    labelNode.classList.add("dp-inline-edit-hidden");

    const input = document.createElement("input");
    input.type = "text";
    input.className = "dp-inline-edit-input";
    input.value = initialName;
    input.maxLength = 180;
    input.setAttribute("aria-label", "Rename");
    input.addEventListener("click", (event) => event.stopPropagation());
    input.addEventListener("dblclick", (event) => event.stopPropagation());
    input.addEventListener("keydown", (event) => event.stopPropagation());
    parent.insertBefore(input, labelNode.nextSibling);

    const error = document.createElement("div");
    error.className = "dp-inline-edit-error";
    parent.insertBefore(error, input.nextSibling);

    input.focus();
    input.select();

    let done = false;
    const showInlineError = (message) => {
      const text = String(message || "").trim();
      const hasError = Boolean(text);
      input.classList.toggle("dp-inline-edit-input-invalid", hasError);
      error.textContent = text;
      error.style.display = hasError ? "block" : "none";
    };

    const validateName = () => {
      const proposed = input.value.trim();
      if (!proposed) return "Name cannot be empty";
      if (typeof config.validate === "function") {
        return config.validate(proposed) || "";
      }
      return "";
    };

    const cleanup = () => {
      input.remove();
      error.remove();
      labelNode.classList.remove("dp-inline-edit-hidden");
      labelNode.dataset.inlineEditing = "0";
    };

    const finish = async (save) => {
      if (done) return;
      const proposed = input.value.trim();

      if (!save) {
        done = true;
        cleanup();
        return;
      }

      const validationError = validateName();
      if (validationError) {
        showInlineError(validationError);
        setTimeout(() => {
          if (!done) input.focus();
        }, 0);
        return;
      }

      if (proposed === initialName) {
        done = true;
        cleanup();
        return;
      }

      done = true;
      cleanup();
      if (typeof config.onSave === "function") {
        await config.onSave(proposed);
      }
    };

    input.addEventListener("input", () => {
      showInlineError(validateName());
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        finish(true);
      } else if (event.key === "Escape") {
        event.preventDefault();
        finish(false);
      }
    });

    input.addEventListener("blur", () => {
      finish(true);
    });
  }

  async function openTextPreview(item, title) {
    if (!item || getItemType(item) !== "text") return;
    let content = item.previewText || "";
    try {
      if (item.filepath && window.electron && typeof window.electron.readTextFile === "function") {
        const result = await window.electron.readTextFile(item.filepath, 512 * 1024);
        if (result && result.ok) {
          content = result.content || "";
          if (result.truncated) {
            content += "\n\n--- truncated preview (512KB) ---";
          }
        }
      }
    } catch (error) {
      console.warn("[DropPoint] Text preview error", error);
    }

    textPreviewTitle.textContent = title || "Text Preview";
    textPreviewBody.textContent = content || "(empty text)";
    textPreviewOverlay.classList.add("dp-open");

  function positionClipImageHover(event) {
    if (!clipImageHover.classList.contains("dp-open")) return;
    const offset = 14;
    const width = clipImageHover.offsetWidth || 240;
    const height = clipImageHover.offsetHeight || 180;
    let left = event.clientX + offset;
    let top = event.clientY + offset;
    if (left + width > window.innerWidth - 10) {
      left = event.clientX - width - offset;
    }
    if (top + height > window.innerHeight - 10) {
      top = event.clientY - height - offset;
    }
    clipImageHover.style.left = `${Math.max(8, Math.round(left))}px`;
    clipImageHover.style.top = `${Math.max(8, Math.round(top))}px`;
  }

  function fitClipImageHoverToImage() {
    const naturalW = clipImageHoverImg.naturalWidth || 0;
    const naturalH = clipImageHoverImg.naturalHeight || 0;
    const maxW = Math.max(220, Math.round(window.innerWidth * 0.62));
    const maxH = Math.max(160, Math.round(window.innerHeight * 0.56));
    if (!naturalW || !naturalH) {
      clipImageHover.style.width = `${Math.min(360, maxW)}px`;
      clipImageHover.style.height = `${Math.min(280, maxH)}px`;
      return;
    }

    const scale = Math.min(maxW / naturalW, maxH / naturalH);
    const width = Math.max(160, Math.round(naturalW * scale));
    const height = Math.max(120, Math.round(naturalH * scale));
    clipImageHover.style.width = `${width}px`;
    clipImageHover.style.height = `${height}px`;
  }

  function showClipImageHover(item, event) {
    clearTimeout(clipImageHoverTimer);
    clipImageHoverTimer = setTimeout(() => {
      clipImageHoverImg.src = toFileUrl(item.filepath);
      fitClipImageHoverToImage();
      clipImageHoverImg.onload = () => {
        fitClipImageHoverToImage();
        positionClipImageHover(event);
      };
      clipImageHover.classList.add("dp-open");
      clipImageHover.setAttribute("aria-hidden", "false");
      positionClipImageHover(event);

  }

  function hideClipImageHover() {

  function saveZoneName(name) {

  function showToast(message) {

  function previewLabel(item) {
    const itemType = getItemType(item);
    if (itemType === "text") {
      return item.previewText ? item.previewText.replace(/\s+/g, " ") : "Text snippet";
    }
    if (itemType === "image") return item.source === "vault" ? "Pasted image" : "Image reference";
    return item.source === "vault" ? "Stored in DropPoint" : "Linked reference";
  }

  function ensureZonesModel(rawZones) {
    const normalized = (rawZones || []).map((entry) => {
      if (entry && entry.type) {
        return {
          ...entry,
          parentId: entry.parentId || ROOT_FOLDER_ID,
          clipFolders:
            entry.type === "zone"
              ? ensureClipFoldersModel(entry.clipFolders)
              : entry.clipFolders,
        };
      }

      return {
        ...entry,
        type: "zone",
        parentId: ROOT_FOLDER_ID,
        clipFolders: ensureClipFoldersModel([{ id: CLIP_ROOT_ID, name: "Root", parentId: null, colorKey: ROOT_FOLDER_COLOR_KEY }]),
      };
    });

    return normalized;
  }

  function getFolderById(folderId) {
    if (folderId === ROOT_FOLDER_ID) {
      return { id: ROOT_FOLDER_ID, type: "folder", name: "Root", parentId: null };
    }
    return zones.find((entry) => entry.id === folderId && entry.type === "folder");
  }

  function getFolderPath(folderId) {
    const path = [];
    let cursor = folderId;
    while (cursor && cursor !== ROOT_FOLDER_ID) {
      const folder = getFolderById(cursor);
      if (!folder) break;
      path.unshift(folder);
      cursor = folder.parentId;
    }
    return [{ id: ROOT_FOLDER_ID, name: "Root" }, ...path];
  }

  function getEntriesInCurrentFolder() {
    const entries = zones.filter((entry) => (entry.parentId || ROOT_FOLDER_ID) === currentFolderId);
    const folders = entries.filter((entry) => entry.type === "folder").sort((a, b) => a.name.localeCompare(b.name));
    const zoneEntries = entries
      .filter((entry) => entry.type === "zone")
      .sort((a, b) => (b.savedAt || "").localeCompare(a.savedAt || ""));
    return [...folders, ...zoneEntries];
  }

  function hasNestedEntries(folderId) {
    return zones.some((entry) => (entry.parentId || ROOT_FOLDER_ID) === folderId);

  function createThumb(item) {

  function renderClipBreadcrumbs() {
    clipBreadcrumbs.innerHTML = "";
    const crumbs = clipFolderPath(currentClipFolderId);
    crumbs.forEach((crumb) => {
      const node = document.createElement("button");
      node.className = "dp-clip-crumb";
      applyFolderColor(node, crumb.colorKey);
      if (crumb.id === currentClipFolderId) {
        node.classList.add("dp-clip-crumb-active");
      }
      node.textContent = crumb.name;
      node.addEventListener("click", () => {
        setCurrentClipFolder(crumb.id);
        renderItems(window.droppoint.getFiles());
      });

      bindDropTarget(node, "application/x-dp-item-ids", (event) => {
        const raw = event.dataTransfer.getData("application/x-dp-item-ids");
        if (!raw) return;
        const ids = JSON.parse(raw);
        const next = window.droppoint.getFiles().map((entry) =>
          ids.includes(entry.id) ? { ...entry, parentClipFolderId: crumb.id } : entry
        );
        window.droppoint.replaceItems(next);
        scheduleAutoSave();
      });

      clipBreadcrumbs.appendChild(node);
    });
  }

  function renderItems(files) {
    memoryList.innerHTML = "";
    hideFolderColorPicker();
    memoryList.classList.toggle("dp-clip-grid", clipView === "grid");
    renderClipBreadcrumbs();

    const existingIds = new Set(files.map((item) => item.id));
    selectedIds.forEach((id) => {
      if (!existingIds.has(id)) selectedIds.delete(id);
    });

    const childFolders = clipFolders.filter((folder) => folder.parentId === currentClipFolderId);
    childFolders.forEach((folder) => {
      const row = document.createElement("div");
      row.className = "dp-memory-item dp-memory-folder";
      applyFolderColor(row, folder.colorKey);

      const thumb = document.createElement("div");
      thumb.className = "dp-memory-thumb dp-memory-thumb-folder";
      const glyph = document.createElement("div");
      glyph.className = "dp-folder-glyph";
      for (let i = 0; i < 4; i += 1) {
        const cell = document.createElement("span");
        glyph.appendChild(cell);
      }
      const dirLabel = document.createElement("div");
      dirLabel.className = "dp-folder-dir-label";
      dirLabel.textContent = "DIR";
      thumb.appendChild(glyph);
      thumb.appendChild(dirLabel);

      const meta = document.createElement("div");
      meta.className = "dp-memory-meta";
      const name = document.createElement("div");
      name.className = "dp-memory-name dp-editable-name";
      name.textContent = folder.name;
      name.title = "Double click to rename folder";
      name.addEventListener("dblclick", (event) => {
        event.preventDefault();
        event.stopPropagation();
        startInlineRename(name, {
          initialName: folder.name,
          validate: (nextName) => {
            const siblings = clipFolders.filter((entry) => entry.parentId === folder.parentId);
            return isNameTakenInSiblings(nextName, siblings, folder.id)
              ? "Folder name already exists"
              : "";
          },
          onSave: async (nextName) => {
            folder.name = nextName;
            renderItems(window.droppoint.getFiles());
            scheduleAutoSave();
            showToast(`Folder renamed: ${nextName}`);
          },
        });
      });
      const preview = document.createElement("div");
      preview.className = "dp-memory-preview";
      const nestedFoldersCount = clipFolders.filter((entry) => entry.parentId === folder.id).length;
      const nestedItemsCount = files.filter((entry) => (entry.parentClipFolderId || CLIP_ROOT_ID) === folder.id).length;
      const nestedTotal = nestedFoldersCount + nestedItemsCount;
      preview.textContent = nestedTotal ? `${nestedTotal} item${nestedTotal === 1 ? "" : "s"}` : "Empty folder";
      meta.appendChild(name);
      meta.appendChild(preview);

      const actions = document.createElement("div");
      actions.className = "dp-memory-actions";

      const openBtn = document.createElement("button");
      openBtn.className = "dp-mini-btn";
      openBtn.textContent = "Open";
      openBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        setCurrentClipFolder(folder.id);
        renderItems(window.droppoint.getFiles());
      });

    const renameBtn = document.createElement("button");
    renameBtn.className = "dp-mini-btn";
    renameBtn.textContent = "Rename";
    renameBtn.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      name.dispatchEvent(new MouseEvent("dblclick", { bubbles: false }));
    });

      const colorBtn = document.createElement("button");
      colorBtn.className = "dp-mini-btn dp-folder-color-btn";
      colorBtn.textContent = "Color";
      colorBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        openFolderColorPicker(colorBtn, folder);
      });

      actions.appendChild(openBtn);
      actions.appendChild(renameBtn);
      actions.appendChild(colorBtn);

      row.appendChild(thumb);
      row.appendChild(meta);
      row.appendChild(actions);

      row.addEventListener("dblclick", () => {
        setCurrentClipFolder(folder.id);
        renderItems(window.droppoint.getFiles());
      });

      bindDropTarget(row, "application/x-dp-item-ids", (event) => {
        const raw = event.dataTransfer.getData("application/x-dp-item-ids");
        if (!raw) return;
        const ids = JSON.parse(raw);
        const next = window.droppoint.getFiles().map((entry) =>
          ids.includes(entry.id) ? { ...entry, parentClipFolderId: folder.id } : entry
        );
        window.droppoint.replaceItems(next);
        scheduleAutoSave();
      });

      memoryList.appendChild(row);
    });

    files
      .filter((entry) => (entry.parentClipFolderId || CLIP_ROOT_ID) === currentClipFolderId)
      .forEach((item) => {
      const row = document.createElement("div");
      row.className = "dp-memory-item";
      row.draggable = true;
      row.dataset.itemId = item.id || "";
      if (selectedIds.has(item.id)) {
        row.classList.add("dp-memory-selected");
      }

      const thumb = createThumb(item);

      const meta = document.createElement("div");
      meta.className = "dp-memory-meta";

      const name = document.createElement("div");
      name.className = "dp-memory-name dp-editable-name";
      name.textContent = item.displayName || fileNameFromPath(item.filepath);
      name.title = "Double click to rename item";
      name.addEventListener("dblclick", (event) => {
        event.preventDefault();
        event.stopPropagation();
        startInlineRename(name, {
          initialName: item.displayName || fileNameFromPath(item.filepath),
          validate: (nextName) => {
            const target = nextName.trim().toLowerCase();
            const duplicate = files.some((entry) => {
              if (!entry) return false;
              if (entry.id && item.id) return entry.id !== item.id && String(entry.displayName || fileNameFromPath(entry.filepath)).trim().toLowerCase() === target;
              return entry.filepath !== item.filepath && String(entry.displayName || fileNameFromPath(entry.filepath)).trim().toLowerCase() === target;
            });
            return duplicate ? "Item name already exists" : "";
          },
          onSave: async (nextName) => {
            const nextItems = window.droppoint.getFiles().map((entry) => {
              if (entry.id === item.id) return { ...entry, displayName: nextName };
              if (!item.id && entry.filepath === item.filepath) {
                return { ...entry, displayName: nextName };
              }
              return entry;
            });
            window.droppoint.replaceItems(nextItems);
            scheduleAutoSave();
            showToast(`Item renamed: ${nextName}`);
          },
        });
      });

      const preview = document.createElement("div");
      preview.className = "dp-memory-preview";
      preview.textContent = previewLabel(item);

      meta.appendChild(name);
      meta.appendChild(preview);

      const actions = document.createElement("div");
      actions.className = "dp-memory-actions";
      const itemType = getItemType(item);

      if (itemType === "text") {
        const previewBtn = document.createElement("button");
        previewBtn.className = "dp-mini-btn";
        previewBtn.textContent = "View";
        previewBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          openTextPreview(item, item.displayName || "Text Preview");
        });
        actions.appendChild(previewBtn);
      }

      const dragBtn = document.createElement("button");
      dragBtn.className = "dp-mini-btn";
      dragBtn.textContent = "Drag";
      dragBtn.draggable = true;
      dragBtn.addEventListener("click", () => {
        showToast("Drag from the card to drop externally");
      });

      const delBtn = document.createElement("button");
      delBtn.className = "dp-mini-btn";
      delBtn.textContent = "Del";
      delBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        if (!confirmDanger(`Delete \"${item.displayName || fileNameFromPath(item.filepath)}\"?`)) {
          return;
        }
        const next = window.droppoint.getFiles().filter((entry) => entry.id !== item.id);
        window.droppoint.replaceItems(next);
        scheduleAutoSave();
      });

      actions.appendChild(dragBtn);
      actions.appendChild(delBtn);

      row.appendChild(thumb);
      row.appendChild(meta);
      row.appendChild(actions);

      row.addEventListener("dragstart", (event) => {
        event.dataTransfer.setData(
          "application/x-dp-item-ids",
          JSON.stringify(selectedIds.has(item.id) ? [...selectedIds] : [item.id])
        );
      });

      dragBtn.addEventListener("dragstart", (event) => {
        event.stopPropagation();
        event.preventDefault();
        const allItems = window.droppoint.getFiles();
        const intended = selectedIds.has(item.id)
          ? allItems.filter((entry) => selectedIds.has(entry.id))
          : [item];

        if (!intended.length) return;
        window.droppoint.startDragOut(intended);
      });

      row.addEventListener("dblclick", async () => {
        const result = await window.electron.revealInFolder(item.filepath);
        if (!result || !result.ok) {
          row.classList.add("dp-memory-missing");
          showToast("File no longer exists");
        }
      });

      row.addEventListener("click", (event) => {
        if (!item.id) return;
        if (event.ctrlKey || event.metaKey) {
          if (selectedIds.has(item.id)) {
            selectedIds.delete(item.id);
          } else {
            selectedIds.add(item.id);
          }
        } else {
          selectedIds = new Set([item.id]);
        }
        syncSelectionClasses();
      });

      memoryList.appendChild(row);
    });

    dropHint.textContent = files.length
      ? "Keep dropping more files or paste with Ctrl+V"
      : "Drop files or paste text/images with Ctrl+V";
  }

  function resizeWidget() {
    const count = window.droppoint.getFiles().length;
    const estimatedHeight = WIDGET_MIN_HEIGHT + Math.min(count, 10) * 56;
    const maxHeight = Math.floor(window.screen.availHeight * WIDGET_MAX_SCREEN_RATIO);
    const targetHeight = Math.min(estimatedHeight, maxHeight);
    window.electron.resizeWindow(WIDGET_WIDTH, Math.max(WIDGET_MIN_HEIGHT, targetHeight));
  }

  function syncRendererView(files) {
    renderItems(files);
    updateSaveBtnState();
    resizeWidget();
  }

  async function refreshZones() {
    zones = ensureZonesModel(await window.electron.getGalleryZones());
    updateGalleryBtnState();
  }

  async function persistZones() {
    await window.electron.setGalleryZones(zones);
    updateGalleryBtnState();
  }

  async function saveCurrentZone(auto = false) {
    const items = window.droppoint.getFiles();
    if (auto && items.length === 0 && clipFolders.length <= 1) return;

    const targetId = loadedZoneId || Date.now();
    const zone = {
      id: targetId,
      type: "zone",
      name: zoneName.textContent || "Drop Zone",
      files: items,
      clipFolders,
      parentId: currentFolderId,
      savedAt: new Date().toISOString(),
      autosaved: auto,
    };

    const existingIndex = zones.findIndex((entry) => entry.id === zone.id);
    if (existingIndex === -1) {
      zones.unshift(zone);
      loadedZoneId = zone.id;
      if (!auto) showToast("Zone saved");
    } else {
      zones[existingIndex] = zone;
      if (!auto) showToast("Zone updated");
    }

    await persistZones();
  }

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleString();
    } catch (error) {
      return "";
    }
  }

  function createZoneCard(zone) {
    const card = document.createElement("div");
    card.className = "dp-zone-card";
    if (loadedZoneId === zone.id) {
      card.classList.add("dp-card-loaded");
    }
    card.draggable = true;
    card.addEventListener("dragstart", (event) => {
      event.dataTransfer.setData("application/x-dp-zone-id", String(zone.id));
    });

    const header = document.createElement("div");
    header.className = "dp-zone-card-header";

    const name = document.createElement("div");
    name.className = "dp-zone-card-name dp-editable-name";
    name.textContent = zone.name;
    name.title = "Double click to rename";
    name.addEventListener("dblclick", (event) => {
      event.preventDefault();
      event.stopPropagation();
      startInlineRename(name, {
        initialName: zone.name,
        validate: (nextName) => {
          const target = nextName.trim().toLowerCase();
          const duplicate = zones.some((entry) => {
            if (!entry || entry.type !== "zone" || entry.id === zone.id) return false;
            if ((entry.parentId || ROOT_FOLDER_ID) !== (zone.parentId || ROOT_FOLDER_ID)) return false;
            return String(entry.name || "").trim().toLowerCase() === target;
          });
          return duplicate ? "Zone name already exists" : "";
        },
        onSave: async (nextName) => {
          zone.name = nextName;
          zone.savedAt = new Date().toISOString();
          zone.autosaved = false;
          if (loadedZoneId === zone.id) {
            saveZoneName(nextName);
          }
          await persistZones();
          renderGallery();
          showToast(`Zone renamed: ${nextName}`);
        },
      });
    });

    const meta = document.createElement("div");
    meta.className = "dp-zone-card-meta";
    meta.textContent = `${(zone.files || []).length} item(s)`;

    const info = document.createElement("div");
    info.className = "dp-zone-card-info";
    info.appendChild(meta);

    if (loadedZoneId === zone.id) {
      const loadedBadge = document.createElement("span");
      loadedBadge.className = "dp-loaded-badge";
      loadedBadge.textContent = "Loaded";
      info.appendChild(loadedBadge);
    }

    if (zone.autosaved) {
      const autosavedBadge = document.createElement("span");
      autosavedBadge.className = "dp-autosaved-badge";
      autosavedBadge.textContent = "Autosaved";
      info.appendChild(autosavedBadge);
    }

    const actions = document.createElement("div");
    actions.className = "dp-zone-card-actions";

    const loadBtn = document.createElement("button");
    loadBtn.className = "dp-card-btn dp-card-btn-load";
    loadBtn.textContent = "Load";
    loadBtn.addEventListener("click", () => {
      loadedZoneId = zone.id;
      saveZoneName(zone.name);
      clipFolders = ensureClipFoldersModel(zone.clipFolders);
      setCurrentClipFolder(CLIP_ROOT_ID);
      window.droppoint.replaceItems(zone.files || []);
      overlay.classList.remove("dp-open");
      galleryList.classList.remove("dp-gallery-grid");
      showToast(`Loaded: ${zone.name}`);
    });

    const delBtn = document.createElement("button");
    delBtn.className = "dp-card-btn dp-card-btn-delete";
    delBtn.textContent = "Delete";
    delBtn.addEventListener("click", async () => {
      if (!confirmDanger(`Delete zone \"${zone.name}\"?`)) {
        return;
      }
      zones = zones.filter((entry) => entry.id !== zone.id);
      if (loadedZoneId === zone.id) loadedZoneId = null;
      await persistZones();
      renderGallery();
    });

    actions.appendChild(loadBtn);
    actions.appendChild(delBtn);

    header.appendChild(name);
    header.appendChild(info);
    header.appendChild(actions);

    card.appendChild(header);

    const filesWrap = document.createElement("div");
    filesWrap.className = "dp-zone-files";
    (zone.files || []).slice(0, 8).forEach((item) => {
      const itemType = getItemType(item);
      const chip = document.createElement("div");
      chip.className = "dp-file-chip";
      chip.title = item.displayName || fileNameFromPath(item.filepath);

      const icon = document.createElement("span");
      icon.className = "dp-file-chip-icon";
      icon.textContent = itemType === "image" ? "IMG" : itemType === "text" ? "TXT" : "FILE";

      const label = document.createElement("span");
      label.className = "dp-file-chip-name dp-editable-name";
      label.textContent = item.displayName || fileNameFromPath(item.filepath);
      label.title = "Double click to rename item";
      label.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      label.addEventListener("dblclick", (event) => {
        event.preventDefault();
        event.stopPropagation();
        startInlineRename(label, {
          initialName: item.displayName || fileNameFromPath(item.filepath),
          validate: (nextName) => {
            const target = nextName.trim().toLowerCase();
            const duplicate = (zone.files || []).some((entry) => {
              if (!entry) return false;
              if (entry.id && item.id) return entry.id !== item.id && String(entry.displayName || fileNameFromPath(entry.filepath)).trim().toLowerCase() === target;
              return entry.filepath !== item.filepath && String(entry.displayName || fileNameFromPath(entry.filepath)).trim().toLowerCase() === target;
            });
            return duplicate ? "Item name already exists" : "";
          },
          onSave: async (nextName) => {
            item.displayName = nextName;
            zone.savedAt = new Date().toISOString();
            zone.autosaved = false;

            if (loadedZoneId === zone.id) {
              const synced = window.droppoint.getFiles().map((entry) => {
                if (entry.id === item.id) return { ...entry, displayName: nextName };
                if (!item.id && entry.filepath === item.filepath) {
                  return { ...entry, displayName: nextName };
                }
                return entry;
              });
              window.droppoint.replaceItems(synced);
            }

            await persistZones();
            renderGallery();
            showToast(`Item renamed: ${nextName}`);
          },
        });
      });

      chip.appendChild(icon);
      chip.appendChild(label);

      if (itemType === "text") {

    card.appendChild(filesWrap);

    const date = document.createElement("div");
    date.className = "dp-zone-card-date";
    date.textContent = `Saved ${formatDate(zone.savedAt)}`;
    card.appendChild(date);

    return card;

  function createFolderCard(folder) {
    const card = document.createElement("div");
    card.className = "dp-zone-card dp-folder-card";
    card.draggable = true;
    card.addEventListener("dragstart", (event) => {
      event.dataTransfer.setData("application/x-dp-zone-id", String(folder.id));
    });

    const header = document.createElement("div");
    header.className = "dp-zone-card-header";

    const name = document.createElement("div");
    name.className = "dp-zone-card-name dp-editable-name";
    name.textContent = folder.name;
    name.title = "Double click to rename";
    name.addEventListener("dblclick", (event) => {
      event.preventDefault();
      event.stopPropagation();
      startInlineRename(name, {
        initialName: folder.name,
        validate: (nextName) => {
          const siblings = zones.filter(
            (entry) =>
              entry.type === "folder" &&
              (entry.parentId || ROOT_FOLDER_ID) === (folder.parentId || ROOT_FOLDER_ID)
          );
          return isNameTakenInSiblings(nextName, siblings, folder.id)
            ? "Folder name already exists"
            : "";
        },
        onSave: async (nextName) => {
          folder.name = nextName;
          await persistZones();
          renderGallery();
          showToast(`Folder renamed: ${nextName}`);
        },
      });
    });

    const meta = document.createElement("div");
    meta.className = "dp-folder-meta";
    meta.textContent = "Folder";

    const actions = document.createElement("div");
    actions.className = "dp-zone-card-actions";

    const openBtn = document.createElement("button");
    openBtn.className = "dp-card-btn dp-card-btn-load";
    openBtn.textContent = "Open";
    openBtn.addEventListener("click", () => {
      currentFolderId = folder.id;
      renderGallery();
    });

    const renameBtn = document.createElement("button");
    renameBtn.className = "dp-card-btn dp-card-btn-load";
    renameBtn.textContent = "Rename";
    renameBtn.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      name.dispatchEvent(new MouseEvent("dblclick", { bubbles: false }));
    });

    bindDropTarget(card, "application/x-dp-zone-id", async (event) => {
      const draggedId = event.dataTransfer.getData("application/x-dp-zone-id");
      if (!draggedId || String(folder.id) === draggedId) return;
      const dragged = zones.find((entry) => String(entry.id) === draggedId);
      if (!dragged) return;
      dragged.parentId = folder.id;
      await persistZones();
      renderGallery();

    const delBtn = document.createElement("button");
    delBtn.className = "dp-card-btn dp-card-btn-delete";

        showToast("Folder not empty");
        return;
      }

        return;

      renderGallery();

    actions.appendChild(delBtn);

    header.appendChild(meta);

  function renderBreadcrumbs() {
    galleryBreadcrumbs.innerHTML = "";
    const crumbs = getFolderPath(currentFolderId);
    crumbs.forEach((crumb) => {
      const btn = document.createElement("button");
      btn.className = "dp-crumb";
      if (crumb.id === currentFolderId) {
        btn.classList.add("dp-crumb-active");
      }
      btn.textContent = crumb.name;
      if (crumb.id !== ROOT_FOLDER_ID) {
        btn.title = "Double click to rename folder";
        btn.addEventListener("dblclick", (event) => {
          event.preventDefault();
          event.stopPropagation();
          const folder = zones.find((entry) => entry.type === "folder" && entry.id === crumb.id);
          if (!folder) return;

          startInlineRename(btn, {
            initialName: folder.name,
            validate: (nextName) => {
              const siblings = zones.filter(
                (entry) =>
                  entry.type === "folder" &&
                  (entry.parentId || ROOT_FOLDER_ID) === (folder.parentId || ROOT_FOLDER_ID)
              );
              return isNameTakenInSiblings(nextName, siblings, folder.id)
                ? "Folder name already exists"
                : "";
            },
            onSave: async (nextName) => {
              folder.name = nextName;
              await persistZones();
              renderGallery();
              showToast(`Folder renamed: ${nextName}`);
            },
          });
        });
      }
      btn.addEventListener("click", () => {
        currentFolderId = crumb.id;
        renderGallery();
      });

      bindDropTarget(btn, "application/x-dp-zone-id", async (event) => {
        const draggedId = event.dataTransfer.getData("application/x-dp-zone-id");
        if (!draggedId) return;
        const dragged = zones.find((entry) => String(entry.id) === draggedId);
        if (!dragged) return;
        dragged.parentId = crumb.id;
        await persistZones();
        renderGallery();
      });

      galleryBreadcrumbs.appendChild(btn);
    });
  }

  function renderGallery() {
    renderBreadcrumbs();
    galleryList.innerHTML = "";
    galleryList.classList.toggle("dp-gallery-grid", galleryView === "grid");

    const entries = getEntriesInCurrentFolder();
    if (!entries.length) {
      galleryEmpty.style.display = "";
      galleryList.style.display = "none";
      return;
    }

    galleryEmpty.style.display = "none";
    galleryList.style.display = "";
    entries.forEach((entry) => {
      if (entry.type === "folder") {
        galleryList.appendChild(createFolderCard(entry));
      } else {
        galleryList.appendChild(createZoneCard(entry));
      }
    });
  }

    const name = document.createElement("div");
    name.className = "dp-clip-name";
    name.textContent = item.displayName || fileNameFromPath(item.filepath);
    const preview = document.createElement("div");
    preview.className = "dp-clip-preview";
    preview.textContent = item.previewText || (itemType === "image" ? "Clipboard image" : "Clipboard text");
    meta.appendChild(name);
    meta.appendChild(preview);

    const actions = document.createElement("div");
    actions.className = "dp-zone-card-actions";

    if (itemType === "text") {
      const viewBtn = document.createElement("button");
      viewBtn.className = "dp-card-btn dp-card-btn-load";
      viewBtn.textContent = "View";
      viewBtn.addEventListener("click", () => {
        openTextPreview(item, item.displayName || "Clipboard text");
      });
      actions.appendChild(viewBtn);
    }

    const addBtn = document.createElement("button");
    addBtn.className = "dp-card-btn dp-card-btn-load";
    addBtn.textContent = "Add";
    addBtn.addEventListener("click", () => {
      window.droppoint.addItems([item]);
      showToast("Added from clipboard");
    });
    actions.appendChild(addBtn);

    row.addEventListener("dragstart", (event) => {
      event.preventDefault();
      hideClipImageHover();
      window.droppoint.startDragOut([item]);
    });

    if (itemType === "image") {
      row.addEventListener("mouseenter", (event) => {
        showClipImageHover(item, event);
      });
      row.addEventListener("mousemove", (event) => {
        positionClipImageHover(event);
      });
      row.addEventListener("mouseleave", () => {
        hideClipImageHover();
      });
      row.addEventListener("dblclick", (event) => {
        if (event.target.closest("button")) return;
        hideClipImageHover();
        openImagePreview(item, item.displayName || "Clipboard image");
      });
    }

    row.appendChild(thumb);
    row.appendChild(meta);
    row.appendChild(actions);
    return row;
  }

  function renderClipboardFlow() {
    hideClipImageHover();
    clipboardList.innerHTML = "";
    clipboardItems.forEach((item) => {
      clipboardList.appendChild(createClipboardRow(item));
    });
  }

  function suspendClipboardDuringWindowDragHint() {
    if (!window.electron || typeof window.electron.suspendClipboardCapture !== "function") {
      return;
    }
    window.electron.suspendClipboardCapture(4000);
  }

  async function handlePaste(event) {
    const clipboard = event.clipboardData;
    if (!clipboard) return;

    const imageItem = Array.from(clipboard.items || []).find(
      (entry) => entry.kind === "file" && entry.type.startsWith("image/")
    );

    if (imageItem) {
      event.preventDefault();
      const imageFile = imageItem.getAsFile();
      if (!imageFile) return;
      const reader = new FileReader();
      reader.onload = async () => {
        const stored = await window.electron.saveClipboardImage(reader.result);
        window.droppoint.addItems([stored]);
        showToast("Image pasted");
      };
      reader.readAsDataURL(imageFile);
      return;
    }

    const text = clipboard.getData("text/plain");
    if (text) {
      event.preventDefault();
      const stored = await window.electron.saveClipboardText(text);
      stored.displayName = `note-${new Date().toISOString().slice(11, 19).replace(/:/g, "")}.txt`;
      window.droppoint.addItems([stored]);
      showToast("Text pasted");
    }
  }

  function setupEvents() {
    if (uploadArea) uploadArea.style.display = "none";
    if (dragArea) dragArea.style.display = "none";

    let renameCanceled = false;
    const startRename = () => {
      renameCanceled = false;
      zoneName.style.display = "none";
      renameRow.style.display = "flex";
      zoneInput.style.display = "block";
      zoneInput.value = zoneName.textContent;
      zoneInput.focus();
      zoneInput.select();
    };

    const finishRename = (shouldSave) => {
      const previous = zoneName.textContent;
      if (shouldSave && !renameCanceled) {
        saveZoneName(zoneInput.value);
      } else {
        zoneInput.value = zoneName.textContent;
      }
      zoneInput.style.display = "none";
      renameRow.style.display = "none";
      zoneName.style.display = "";
      if (zoneName.textContent !== previous) {
        scheduleAutoSave();
      }
    };

    zoneName.addEventListener("dblclick", (event) => {
      event.preventDefault();
      event.stopPropagation();
      startRename();
    });

    renameCancelBtn.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      renameCanceled = true;
      finishRename(false);
    });

    zoneInput.addEventListener("blur", () => {
      finishRename(true);
    });

    zoneInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") zoneInput.blur();
      if (event.key === "Escape") {
        renameCanceled = true;
        finishRename(false);
      }
    });

    saveBtn.addEventListener("click", saveCurrentZone);

    newBtn.addEventListener("click", () => {
      window.electron.spawnInstance();
    });

    clearBtn.addEventListener("click", () => {
      if (!confirmDanger("Clear this zone and reset all internal folders?")) {
        return;
      }
      window.droppoint.clearItems();
      selectedIds.clear();
      loadedZoneId = null;
      currentFolderId = ROOT_FOLDER_ID;
      resetClipFoldersState();
      saveZoneName(nextZoneName());
      showToast("Zone cleared");
    });

    clipViewToggleBtn.addEventListener("click", () => {
      clipView = clipView === "grid" ? "list" : "grid";
      clipViewToggleBtn.textContent = clipView === "grid" ? "List" : "Grid";
      renderItems(window.droppoint.getFiles());
    });

    clipUpBtn.addEventListener("click", () => {
      if (currentClipFolderId === CLIP_ROOT_ID) return;
      const folder = getClipFolderById(currentClipFolderId);
      setCurrentClipFolder(folder && folder.parentId ? folder.parentId : CLIP_ROOT_ID);
      renderItems(window.droppoint.getFiles());
    });

    clipNewFolderBtn.addEventListener("click", () => {
      const parentFolder = getClipFolderById(currentClipFolderId);
      const name = nextFolderName(
        clipFolders
          .filter((folder) => folder.parentId === currentClipFolderId)
          .map((folder) => folder.name)
      );
      clipFolders.push({
        id: `clip-folder-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,
        name,
        parentId: currentClipFolderId,
        colorKey: parentFolder ? parentFolder.colorKey : DEFAULT_FOLDER_COLOR_KEY,
      });
      renderItems(window.droppoint.getFiles());
      scheduleAutoSave();
      showToast(`Folder created: ${name}`);
    });

    closeBtn.addEventListener("click", () => {
      window.close();
    });

    galleryBtn.addEventListener("click", () => {
      renderGallery();
      overlay.classList.add("dp-open");
      window.electron.resizeWindow(GALLERY_W, GALLERY_H);
    });

    clipboardBtn.addEventListener("click", () => {
      renderClipboardFlow();
      clipboardOverlay.classList.add("dp-open");
      window.electron.resizeWindow(620, 640);
    });

    galClose.addEventListener("click", () => {
      overlay.classList.remove("dp-open");
      resizeWidget();
    });

    clipboardCloseBtn.addEventListener("click", () => {
      hideClipImageHover();
      clipboardOverlay.classList.remove("dp-open");
      resizeWidget();
    });

    textPreviewCloseBtn.addEventListener("click", () => {
      textPreviewOverlay.classList.remove("dp-open");
    });

    imagePreviewCloseBtn.addEventListener("click", () => {
      closeImagePreview();
    });

    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) {
        overlay.classList.remove("dp-open");
        resizeWidget();
      }
    });

    clipboardOverlay.addEventListener("click", (event) => {
      if (event.target === clipboardOverlay) {
        hideClipImageHover();
        clipboardOverlay.classList.remove("dp-open");
        resizeWidget();
      }
    });

    textPreviewOverlay.addEventListener("click", (event) => {
      if (event.target === textPreviewOverlay) {
        textPreviewOverlay.classList.remove("dp-open");
      }
    });

    imagePreviewOverlay.addEventListener("click", (event) => {
      if (event.target === imagePreviewOverlay) {
        closeImagePreview();
      }
    });

    galleryViewToggleBtn.addEventListener("click", () => {
      galleryView = galleryView === "grid" ? "list" : "grid";
      galleryViewToggleBtn.textContent = galleryView === "grid" ? "List" : "Grid";
      renderGallery();
    });

    galleryUpBtn.addEventListener("click", () => {
      const folder = getFolderById(currentFolderId);
      if (!folder || !folder.parentId) {
        currentFolderId = ROOT_FOLDER_ID;
      } else {
        currentFolderId = folder.parentId;
      }
      renderGallery();
    });

    galleryNewFolderBtn.addEventListener("click", async () => {
      const name = nextFolderName(
        zones
          .filter(
            (entry) =>
              entry.type === "folder" &&
              (entry.parentId || ROOT_FOLDER_ID) === currentFolderId
          )
          .map((entry) => entry.name)
      );
      zones.unshift({
        id: `folder-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        type: "folder",
        name,
        parentId: currentFolderId,
        createdAt: new Date().toISOString(),
      });
      await persistZones();
      renderGallery();
      showToast(`Folder created: ${name}`);
    });

    document.addEventListener("paste", handlePaste);
    clipboardList.addEventListener("scroll", () => {
      hideClipImageHover();
    });

    const dragHintZones = [document.getElementById("dp-toolbar"), document.getElementById("droppoint")];
    dragHintZones.forEach((zone) => {
      if (!zone) return;
      zone.addEventListener("pointerdown", () => {
        suspendClipboardDuringWindowDragHint();
      });
      zone.addEventListener("mousedown", () => {
        suspendClipboardDuringWindowDragHint();
      });
    });

    dragSelected.addEventListener("dragstart", (event) => {
      event.preventDefault();
      const allItems = window.droppoint.getFiles();
      const selectedItems = allItems.filter((item) => selectedIds.has(item.id));
      if (!selectedItems.length) {
        showToast("Select one or more items first");
        return;
      }
      window.droppoint.startDragOut(selectedItems);
    });

    dragAll.addEventListener("dragstart", (event) => {
      event.preventDefault();
      const allItems = window.droppoint.getFiles();
      if (!allItems.length) {
        showToast("No valid references to drag");
        return;
      }
      window.droppoint.startDragOut(allItems);
    });

    clearMissing.addEventListener("click", async () => {
      if (!confirmDanger("Remove all missing file references from this zone?")) {
        return;
      }
      const allItems = window.droppoint.getFiles();
      const kept = [];
      for (const item of allItems) {
        const exists = await window.electron.fileExists(item.filepath);
        if (exists) kept.push(item);
      }
      window.droppoint.replaceItems(kept);
      showToast("Missing references cleared");
      scheduleAutoSave();
    });

    document.addEventListener("click", (event) => {
      if (!folderColorPicker.classList.contains("dp-open")) return;
      if (folderColorPicker.contains(event.target)) return;
      hideFolderColorPicker();
    });

    window.addEventListener("resize", () => {
      if (!folderColorPicker.classList.contains("dp-open")) return;
      hideFolderColorPicker();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && folderColorPicker.classList.contains("dp-open")) {
        hideFolderColorPicker();
        return;
      }
      if (event.key === "Escape" && textPreviewOverlay.classList.contains("dp-open")) {
        textPreviewOverlay.classList.remove("dp-open");
        return;
      }
      if (event.key === "Escape" && imagePreviewOverlay.classList.contains("dp-open")) {
        closeImagePreview();
        return;
      }
      if (event.key !== "Delete" && event.key !== "Backspace") return;
      if (isTypingTarget(event.target) || isTypingTarget(document.activeElement)) return;

      const allItems = window.droppoint.getFiles();
      const selectedItems = allItems.filter((item) => selectedIds.has(item.id));
      if (!selectedItems.length) return;

      event.preventDefault();
      if (!confirmDanger(`Delete ${selectedItems.length} selected item(s)?`)) {
        return;
      }

      const kept = allItems.filter((item) => !selectedIds.has(item.id));
      window.droppoint.replaceItems(kept);
      selectedIds.clear();
      scheduleAutoSave();
    });

    window.droppoint.subscribe((files) => {
      syncRendererView(files);
      scheduleAutoSave();
    });

    window.electron.onClipboardItem((item) => {
      if (!item) return;
      const exists = clipboardItems.some((entry) => entry.signature === item.signature);
      if (exists) return;
      clipboardItems.unshift(item);
      clipboardItems = clipboardItems.slice(0, 400);
      if (clipboardOverlay.classList.contains("dp-open")) {
        renderClipboardFlow();
      }
    });
  }

  async function init() {
    loadZoneName();
    resetClipFoldersState();
    await refreshZones();
    clipboardItems = await window.electron.getClipboardHistory();
    galleryViewToggleBtn.textContent = "List";
    clipViewToggleBtn.textContent = "Grid";
    setupEvents();
    syncRendererView(window.droppoint.getFiles());
  }

  init();
})();
</script>

</html>
